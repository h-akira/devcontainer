# dnsmasq config for the devcontainer's domain-based firewall.
#
# Acts as a strict whitelist:
#   - Listens on 127.0.0.1 only.
#   - Forwards queries to the host-side upstream DNS ONLY for the
#     allowlisted domains below. The placeholder `__UPSTREAM_DNS__` is
#     substituted by init-firewall.sh at startup with whatever resolver
#     was in /etc/resolv.conf before we overwrote it (typically Docker's
#     embedded 127.0.0.11 on plain Linux Docker, or the VM-side resolver
#     such as 192.168.65.7 on Docker Desktop for Mac).
#   - Returns NXDOMAIN for everything else (no upstream is configured for
#     unlisted domains).
#   - On a successful resolve, adds the resulting IPs to the `allowed-domains`
#     ipset so iptables can let the actual TCP connection through.
#
# This file is the single source of truth for "which domains are allowed".
# Edits should be coordinated with init-firewall.sh / README.md.

# Run in the foreground so we can supervise it from init-firewall.sh.
keep-in-foreground

# No system /etc/resolv.conf: avoid loops and forbid implicit upstream.
no-resolv

# Bind only to loopback. Apps in the container point /etc/resolv.conf at us
# (nameserver 127.0.0.1), and we never accept queries from outside the host.
listen-address=127.0.0.1
bind-interfaces

# We only handle A/AAAA from local apps. Don't read /etc/hosts (we want
# strict allowlist semantics, not "if you put it in hosts it works").
no-hosts

# Logging: log queries so we can debug "why is X blocked?".
log-queries
log-facility=-

# ---- Allowlist ----
# Format:
#   server=/<suffix-or-host>/__UPSTREAM_DNS__   # forward queries to Docker DNS
#   ipset=/<suffix-or-host>/allowed-domains
# `server` and `ipset` use the same matching: a query for foo.<suffix>
# matches `<suffix>`, so listing the apex covers all subdomains.

# AWS — replaces the previous ip-ranges.json wholesale allow.
# Covers every AWS public service endpoint (sts, s3, ec2, ...) and the
# SSO portal at d-xxxxxxxx.awsapps.com.
server=/amazonaws.com/__UPSTREAM_DNS__
ipset=/amazonaws.com/allowed-domains
server=/awsapps.com/__UPSTREAM_DNS__
ipset=/awsapps.com/allowed-domains

# GitHub — replaces the previous api.github.com/meta wholesale allow.
server=/github.com/__UPSTREAM_DNS__
ipset=/github.com/allowed-domains
server=/githubusercontent.com/__UPSTREAM_DNS__
ipset=/githubusercontent.com/allowed-domains

# Anthropic / Claude Code
server=/anthropic.com/__UPSTREAM_DNS__
ipset=/anthropic.com/allowed-domains
# claude.com is used by Claude Code's login flow (e.g. platform.claude.com).
# Suffix-matched so future siblings (console.claude.com, etc.) are covered.
server=/claude.com/__UPSTREAM_DNS__
ipset=/claude.com/allowed-domains

# Debian apt repos
server=/debian.org/__UPSTREAM_DNS__
ipset=/debian.org/allowed-domains

# Python packaging
server=/pypi.org/__UPSTREAM_DNS__
ipset=/pypi.org/allowed-domains
server=/pythonhosted.org/__UPSTREAM_DNS__
ipset=/pythonhosted.org/allowed-domains

# Node packaging
server=/npmjs.org/__UPSTREAM_DNS__
ipset=/npmjs.org/allowed-domains

# MCP / Context7
server=/context7.com/__UPSTREAM_DNS__
ipset=/context7.com/allowed-domains

# Telemetry endpoints reused from the upstream Anthropic devcontainer.
server=/sentry.io/__UPSTREAM_DNS__
ipset=/sentry.io/allowed-domains
server=/statsig.com/__UPSTREAM_DNS__
ipset=/statsig.com/allowed-domains

# uv (Astral) installer / self-update
server=/astral.sh/__UPSTREAM_DNS__
ipset=/astral.sh/allowed-domains

# Microsoft / Azure — pinned to exact hostnames so we do NOT whitelist
# all of core.windows.net (every Azure Blob bucket) or all of
# visualstudio.com (every Azure DevOps tenant). Each entry below uses
# a leading dot so it matches that exact host only.
server=/marketplace.visualstudio.com/__UPSTREAM_DNS__
ipset=/marketplace.visualstudio.com/allowed-domains
server=/update.code.visualstudio.com/__UPSTREAM_DNS__
ipset=/update.code.visualstudio.com/allowed-domains
server=/vscode.blob.core.windows.net/__UPSTREAM_DNS__
ipset=/vscode.blob.core.windows.net/allowed-domains
